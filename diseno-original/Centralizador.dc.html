<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body { background: #0d1117; }
    ::selection { background: #ed8b4e; color: #0d1117; }
    input::placeholder { color: #545d68; }
    @media (max-width: 820px) {
      .cz-shell { grid-template-columns: 1fr !important; }
      .cz-side { position: static !important; height: auto !important; border-right: 0 !important; border-bottom: 1px solid #21262d !important; }
    }
  </style>
</helmet>
<div class="cz-shell" style="min-height:100vh; background:#0d1117; color:#e6edf3; font-family:'Space Grotesk', system-ui, sans-serif; display:grid; grid-template-columns:264px 1fr; max-width:1240px; margin:0 auto;">

  <aside class="cz-side" style="position:sticky; top:0; align-self:start; height:100vh; border-right:1px solid #21262d; padding:32px 22px; display:flex; flex-direction:column; gap:24px; overflow-y:auto;">
    <div>
      <div style="font-family:'JetBrains Mono', monospace; font-size:10px; letter-spacing:0.2em; text-transform:uppercase; color:#ed8b4e; margin-bottom:8px;">Centralizador</div>
      <div style="font-size:19px; font-weight:700; letter-spacing:-0.01em; line-height:1.15;">Mis proyectos</div>
    </div>

    <div style="position:relative;">
      <span style="position:absolute; left:13px; top:50%; transform:translateY(-50%); color:#545d68; font-size:14px;">⌕</span>
      <input value="{{ query }}" onInput="{{ onSearch }}" placeholder="Buscar…" spellcheck="false" style="width:100%; background:#161b22; border:1px solid #21262d; border-radius:9px; color:#e6edf3; font-family:'Space Grotesk', sans-serif; font-size:14px; padding:10px 12px 10px 34px; outline:none;" style-focus="border-color:#ed8b4e; box-shadow:0 0 0 3px rgba(237,139,78,0.16);" />
    </div>

    <nav style="display:flex; flex-direction:column; gap:3px;">
      <div style="font-family:'JetBrains Mono', monospace; font-size:10px; letter-spacing:0.16em; text-transform:uppercase; color:#545d68; padding:0 4px 6px;">Categorías</div>
      <sc-for list="{{ navItems }}" as="item" hint-placeholder-count="4">
        <sc-if value="{{ item.active }}" hint-placeholder-val="{{ false }}">
          <button onClick="{{ item.onSelect }}" style="display:flex; align-items:center; gap:10px; width:100%; text-align:left; cursor:pointer; border:1px solid rgba(237,139,78,0.35); background:rgba(237,139,78,0.12); color:#ed8b4e; border-radius:9px; padding:9px 12px; font-family:'Space Grotesk', sans-serif; font-size:14px; font-weight:600;">
            <span style="width:5px; height:5px; border-radius:50%; background:#ed8b4e; flex:none;"></span>
            <span style="flex:1;">{{ item.name }}</span>
            <span style="font-family:'JetBrains Mono', monospace; font-size:11px; color:#ed8b4e;">{{ item.count }}</span>
          </button>
        </sc-if>
        <sc-if value="{{ item.inactive }}" hint-placeholder-val="{{ true }}">
          <button onClick="{{ item.onSelect }}" style="display:flex; align-items:center; gap:10px; width:100%; text-align:left; cursor:pointer; border:1px solid transparent; background:transparent; color:#aeb6c0; border-radius:9px; padding:9px 12px; font-family:'Space Grotesk', sans-serif; font-size:14px; font-weight:500; transition:background .12s, color .12s;" style-hover="background:#161b22; color:#e6edf3;">
            <span style="width:5px; height:5px; border-radius:50%; background:#3a424e; flex:none;"></span>
            <span style="flex:1;">{{ item.name }}</span>
            <span style="font-family:'JetBrains Mono', monospace; font-size:11px; color:#545d68;">{{ item.count }}</span>
          </button>
        </sc-if>
      </sc-for>
    </nav>

    <div style="margin-top:auto; font-family:'JetBrains Mono', monospace; font-size:10px; color:#3a424e; line-height:1.6;">{{ totalCount }} links en total<br>Pásame tus URLs y las lleno.</div>
  </aside>

  <main style="padding:36px 40px 80px; min-width:0;">
    <header style="display:flex; align-items:baseline; justify-content:space-between; gap:16px; margin-bottom:28px;">
      <h1 style="margin:0; font-size:26px; font-weight:700; letter-spacing:-0.02em;">{{ heading }}</h1>
      <span style="font-family:'JetBrains Mono', monospace; font-size:12px; color:#7d8590; white-space:nowrap;">{{ shownCount }} de {{ totalCount }}</span>
    </header>

    <sc-if value="{{ hasResults }}" hint-placeholder-val="{{ true }}">
      <div style="display:flex; flex-direction:column; gap:18px;">
        <sc-for list="{{ cats }}" as="cat" hint-placeholder-count="3">
          <section style="background:#161b22; border:1px solid #21262d; border-radius:14px; padding:22px 24px 24px;">
            <div style="display:flex; align-items:center; gap:11px; margin-bottom:18px;">
              <h2 style="margin:0; font-size:17px; font-weight:600; letter-spacing:-0.01em;">{{ cat.name }}</h2>
              <span style="font-family:'JetBrains Mono', monospace; font-size:11px; color:#7d8590; background:#0d1117; border:1px solid #21262d; border-radius:999px; padding:2px 9px;">{{ cat.count }}</span>
              <div style="flex:1; height:1px; background:#21262d;"></div>
            </div>

            <div style="display:grid; grid-template-columns:{{ cat.cols }}; gap:26px;">
              <sc-for list="{{ cat.groups }}" as="group" hint-placeholder-count="2">
                <div style="min-width:0;">
                  <sc-if value="{{ group.hasName }}" hint-placeholder-val="{{ true }}">
                    <div style="font-family:'JetBrains Mono', monospace; font-size:10px; letter-spacing:0.16em; text-transform:uppercase; color:#7d8590; margin-bottom:10px;">{{ group.name }}</div>
                  </sc-if>
                  <div style="display:flex; flex-direction:column; gap:6px;">
                    <sc-for list="{{ group.links }}" as="link" hint-placeholder-count="3">
                      <sc-if value="{{ link.filled }}" hint-placeholder-val="{{ true }}">
                        <a href="{{ link.url }}" target="_blank" rel="noopener" style="display:flex; align-items:center; gap:11px; text-decoration:none; color:#e6edf3; background:#0d1117; border:1px solid #21262d; border-radius:9px; padding:11px 13px; transition:border-color .12s, background .12s, transform .12s;" style-hover="border-color:#ed8b4e; background:#15110d; transform:translateX(2px);">
                          <span style="width:6px; height:6px; border-radius:50%; background:#ed8b4e; flex:none;"></span>
                          <span style="flex:1; font-size:14px; font-weight:500; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; min-width:0;">{{ link.name }}</span>
                          <span style="font-family:'JetBrains Mono', monospace; font-size:11px; color:#545d68; white-space:nowrap;">{{ link.domain }}</span>
                          <span style="color:#545d68; font-size:13px;">↗</span>
                        </a>
                      </sc-if>
                      <sc-if value="{{ link.empty }}" hint-placeholder-val="{{ true }}">
                        <div style="display:flex; align-items:center; gap:11px; border:1px dashed #2a313c; border-radius:9px; padding:11px 13px; color:#545d68;">
                          <span style="width:6px; height:6px; border-radius:50%; border:1px solid #3a424e; flex:none;"></span>
                          <span style="flex:1; font-size:14px; min-width:0;">{{ link.name }}</span>
                          <span style="font-family:'JetBrains Mono', monospace; font-size:11px; color:#3a424e;">vacío</span>
                        </div>
                      </sc-if>
                    </sc-for>
                  </div>
                </div>
              </sc-for>
            </div>
          </section>
        </sc-for>
      </div>
    </sc-if>

    <sc-if value="{{ noResults }}" hint-placeholder-val="{{ false }}">
      <div style="text-align:center; padding:80px 0; color:#545d68; font-family:'JetBrains Mono', monospace; font-size:13px;">Sin resultados para "{{ query }}"</div>
    </sc-if>
  </main>

</div>
</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  state = { query: "", active: "all" };

  data = [
    {
      name: "FONPLATA",
      cols: "1fr 1fr",
      groups: [
        { name: "Vicepresidencia de Finanzas", links: [
          { name: "Proyecto 1", url: "" },
          { name: "Proyecto 2", url: "" },
          { name: "Proyecto 3", url: "" },
          { name: "Proyecto 4", url: "" },
        ]},
        { name: "General", links: [
          { name: "Proyecto 1", url: "" },
          { name: "Proyecto 2", url: "" },
          { name: "Proyecto 3", url: "" },
          { name: "Proyecto 4", url: "" },
        ]},
      ],
    },
    {
      name: "Política",
      cols: "1fr 1fr",
      groups: [
        { name: null, links: [
          { name: "Proyecto 1", url: "" },
          { name: "Proyecto 2", url: "" },
          { name: "Proyecto 3", url: "" },
          { name: "Proyecto 4", url: "" },
        ]},
      ],
    },
    {
      name: "Masterminds",
      cols: "1fr 1fr",
      groups: [
        { name: null, links: [
          { name: "Proyecto 1", url: "" },
          { name: "Proyecto 2", url: "" },
          { name: "Proyecto 3", url: "" },
          { name: "Proyecto 4", url: "" },
        ]},
      ],
    },
  ];

  domainOf(url) {
    if (!url) return "";
    try { return new URL(url).hostname.replace(/^www\./, ""); }
    catch (e) { return ""; }
  }

  countCat(cat) {
    return cat.groups.reduce((n, g) => n + g.links.filter((l) => l.url).length, 0);
  }

  renderVals() {
    const q = this.state.query.trim().toLowerCase();
    const active = this.state.active;
    let total = 0;
    this.data.forEach((c) => { total += this.countCat(c); });

    const select = (key) => () => this.setState({ active: key });
    const navItems = [
      { name: "Todos", key: "all", count: total },
      ...this.data.map((c) => ({ name: c.name, key: c.name, count: this.countCat(c) })),
    ].map((it) => ({
      ...it,
      active: it.key === active,
      inactive: it.key !== active,
      onSelect: select(it.key),
    }));

    const cats = this.data
      .filter((cat) => active === "all" || cat.name === active)
      .map((cat) => {
        const groups = cat.groups.map((g) => {
          const links = g.links.map((l) => {
            const filled = !!l.url;
            const matches = !q || l.name.toLowerCase().includes(q) || (l.url || "").toLowerCase().includes(q);
            return { ...l, filled, empty: !filled, domain: this.domainOf(l.url), matches };
          });
          const visible = q ? links.filter((l) => l.filled && l.matches) : links;
          return { name: g.name, hasName: !!g.name, links: visible };
        }).filter((g) => g.links.length > 0);

        const count = groups.reduce((n, g) => n + g.links.filter((l) => l.filled).length, 0);
        return { name: cat.name, cols: cat.groups.length > 1 ? cat.cols : "1fr 1fr", count, groups };
      })
      .filter((c) => c.groups.length > 0);

    const shown = cats.reduce((n, c) => n + c.count, 0);

    return {
      query: this.state.query,
      onSearch: (e) => this.setState({ query: e.target.value }),
      navItems,
      cats,
      heading: active === "all" ? "Todos los links" : active,
      totalCount: total,
      shownCount: q ? shown : (active === "all" ? total : shown),
      hasResults: cats.length > 0,
      noResults: cats.length === 0,
    };
  }
}
</script>
</body>
</html>
